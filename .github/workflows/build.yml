name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Restore or create debug keystore
        id: keystore
        uses: actions/cache@v4
        with:
          path: app/debug.keystore
          key: debug-keystore-v1

      - name: Create debug keystore if not cached
        if: steps.keystore.outputs.cache-hit != 'true'
        run: |
          keytool -genkeypair -v \
            -keystore app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=SMS Relay, OU=OhMyJapan, O=OhMyJapan, L=Tokyo, S=Tokyo, C=JP"

      - name: Build debug APK
        run: ./gradlew assembleDebug -Pandroid.injected.signing.store.file=$PWD/app/debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sms-relay-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create/Update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "SMS Relay (Latest Build)"
          body: |
            Latest debug APK — built from commit ${{ github.sha }}

            **Install on phone:**
            1. Open the APK link below on your phone
            2. Download → Open → Install
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          make_latest: true
